<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群閎點餐登記表</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .loading-status {
            text-align: center;
            color: #666;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px 12px;
            text-align: left;
            vertical-align: middle;
            word-wrap: break-word;
        }
        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: bold;
            position: sticky;
            top: 0;
            box-shadow: inset 0 -1px 0 #ddd;
        }
        .department-row {
            background-color: #eef5fc;
        }
        .department-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }
        .department-name {
            color: #1a73e8;
            font-weight: bold;
            font-size: 1.1em;
        }
        .dept-btn {
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 8px;
        }
        .add-user-btn { background-color: #34a853; color: white; }
        .add-user-btn:hover { background-color: #2b8c44; }
        .del-user-btn { background-color: #fbbc05; color: #333; }
        .del-user-btn:hover { background-color: #e0a800; }
        
        .user-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .status-empty { color: #d93025; }
        .status-filled { color: #000000; font-weight: bold; }
        .row-locked { background-color: #f9f9f9; }

        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        input[type="text"]:disabled {
            background-color: #f1f3f4;
            color: #5f6368;
            border: 1px solid #e0e0e0;
        }
        
        .row-btn {
            border: none;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 4px;
        }
        .btn-confirm { background-color: #1a73e8; color: white; }
        .btn-edit { background-color: #757575; color: white; }
        .btn-confirm:hover { background-color: #1557b0; }
        .btn-edit:hover { background-color: #5f6368; }

        .action-container {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .clear-btn {
            background-color: #ea4335;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .clear-btn:hover { background-color: #c5221f; }
    </style>
</head>
<body>

<div class="container">
    <h1>群閎點餐登記表</h1>
    <div id="loadingStatus" class="loading-status">網頁初始名單載入中...</div>
    
    <table id="orderTable">
        <thead>
            <tr>
                <th style="width: 10%;">姓名</th>
                <th style="width: 38%;">名稱 (餐點品項)</th>
                <th style="width: 7.5%;">甜度</th>
                <th style="width: 7.5%;">冰量</th>
                <th style="width: 23%;">備註</th>
                <th style="width: 14%;">狀態操作</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div class="action-container">
        <button class="clear-btn" onclick="confirmClearAll()">全部清除</button>
    </div>
</div>

<script>
    // 🟢 您的 Google GAS 網頁應用程式網址已成功帶入！
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxA0IgRXQywGLHF5DTpWaUqThUr0SaAx31g-nXT6l2L68dN7wcRXNXCwN1Nlv800osfQw/exec";

    // 內建 Excel 原始名單（網頁一開啟絕對不會是空白，預設以此為起點）
    let orderData = [
        { department: "總經理室", members: [{name:"Winnie", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Milly", item:"", sugar:"", ice:"", note:"", locked:false}] },
        { department: "管理部", members: [{name:"Allen", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Kevin", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Nini", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Jeff", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Penny", item:"", sugar:"", ice:"", note:"", locked:false}] },
        { department: "IA國際認證部", members: [{name:"Eric", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Celest", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Jennifer", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Will", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Vanessa", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Jaslene", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Kimyen", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Rossi", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Kev", item:"", sugar:"", ice:"", note:"", locked:false}] },
        { department: "業務部", members: [{name:"Jash", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Jojo", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Lori", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Angel", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Budi", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Jasmine", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Willis", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Brian", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Anita", item:"", sugar:"", ice:"", note:"", locked:false}] },
        { department: "技術服務部", members: [{name:"Felix", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Terry", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Rick", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Rover", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Knight", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Reese", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Wenkai", block:false, name:"Wenkai", item:"", sugar:"", ice:"", note:"", locked:false}, {name:"Danny", item:"", sugar:"", ice:"", note:"", locked:false}] }
    ];

    const tbody = document.querySelector('#orderTable tbody');

    // 網頁一開啟，立刻「同步」渲染出初始版本畫面，絕不留白
    function initAndLoad() {
        renderTable(); 
        showStatus("本地初始名單載入完畢，正在嘗試同步雲端最新數據...");

        // 安全防護判定：若網址未設定正確，則進入本地模式
        if(!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes("YOUR_GAS_WEB_APP_URL")) {
            showStatus("🟢 本地測試模式（未連線雲端資料庫）");
            return;
        }

        // 異步向雲端讀取資料
        fetch(GAS_WEB_APP_URL + "?action=read")
            .then(res => res.json())
            .then(data => {
                if (data && data.length > 0) {
                    orderData = data;
                    renderTable();
                    showStatus("🟢 雲端最新資料同步成功");
                } else {
                    showStatus("🟢 雲端資料庫目前為空，已成功將初始名單上傳同步");
                    saveCloudData();
                }
            })
            .catch(err => {
                showStatus("⚠️ 無法連線雲端，目前顯示為本地預設內容。錯誤原因: " + err);
            });
    }

    // 渲染表格畫面
    function renderTable() {
        tbody.innerHTML = '';
        let globalIndex = 0;

        orderData.forEach((dept, deptIdx) => {
            // 部門橫列 (藍字、粗體)
            const deptRow = document.createElement('tr');
            deptRow.className = 'department-row';
            deptRow.innerHTML = `
                <td colspan="6">
                    <div class="department-header">
                        <span class="department-name">${dept.department}</span>
                        <div>
                            <button class="dept-btn add-user-btn" onclick="addMember(${deptIdx})">+ 新增人員</button>
                            <button class="dept-btn del-user-btn" onclick="deleteMember(${deptIdx})">- 刪除人員</button>
                        </div>
                    </div>
                </td>
            `;
            tbody.appendChild(deptRow);

            // 同仁資料列
            dept.members.forEach((m, mIdx) => {
                const row = document.createElement('tr');
                if(m.locked) row.className = 'row-locked';

                const nameClass = m.item && m.item.trim() !== "" ? "status-filled" : "status-empty";
                const isDis = m.locked ? "disabled" : "";

                row.innerHTML = `
                    <td class="user-name ${nameClass}" id="name-${globalIndex}">${m.name}</td>
                    <td><input type="text" class="input-field" id="item-${globalIndex}" value="${m.item||''}" ${isDis} placeholder="請輸入餐點完整名稱" oninput="updateData(${deptIdx}, ${mIdx}, 'item', this.value, ${globalIndex})"></td>
                    <td><input type="text" class="input-field" value="${m.sugar||''}" ${isDis} placeholder="甜度" oninput="updateData(${deptIdx}, ${mIdx}, 'sugar', this.value)"></td>
                    <td><input type="text" class="input-field" value="${m.ice||''}" ${isDis} placeholder="冰量" oninput="updateData(${deptIdx}, ${mIdx}, 'ice', this.value)"></td>
                    <td><input type="text" class="input-field" value="${m.note||''}" ${isDis} placeholder="備註要求" oninput="updateData(${deptIdx}, ${mIdx}, 'note', this.value)"></td>
                    <td>
                        <button class="row-btn btn-confirm" id="btn-conf-${globalIndex}" onclick="lockRow(${deptIdx}, ${mIdx}, true)" ${m.locked?'disabled':''}>確認</button>
                        <button class="row-btn btn-edit" id="btn-edit-${globalIndex}" onclick="lockRow(${deptIdx}, ${mIdx}, false)" ${!m.locked?'disabled':''}>修改</button>
                    </td>
                `;
                tbody.appendChild(row);
                globalIndex++;
            });
        });
    }

    // 更新資料並觸發即時儲存
    function updateData(deptIdx, mIdx, field, val, gIdx) {
        orderData[deptIdx].members[mIdx][field] = val;
        
        if(field === 'item' && gIdx !== undefined) {
            const nameTd = document.getElementById(`name-${gIdx}`);
            if(val.trim() !== "") {
                nameTd.className = "user-name status-filled";
            } else {
                nameTd.className = "user-name status-empty";
            }
        }
        
        // 防抖機制（延遲 1 秒儲存），避免頻繁發送 API 請求
        clearTimeout(window.saveTimeout);
        window.saveTimeout = setTimeout(saveCloudData, 1000);
    }

    // 儲存至雲端
    function saveCloudData() {
        if(!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes("YOUR_GAS_WEB_APP_URL")) return;
        showStatus("💾 自動同步至雲端中...");
        fetch(GAS_WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify(orderData)
        })
        .then(res => res.text())
        .then(() => showStatus("🟢 所有更新已即時儲存到雲端"))
        .catch(err => showStatus("🔴 雲端儲存失敗: " + err));
    }

    // 鎖定與解鎖
    function lockRow(deptIdx, mIdx, shouldLock) {
        orderData[deptIdx].members[mIdx].locked = shouldLock;
        renderTable();
        saveCloudData();
    }

    // 新增人員
    function addMember(deptIdx) {
        const newName = prompt(`請輸入要新增至【${orderData[deptIdx].department}】的人員姓名：`);
        if (newName && newName.trim() !== "") {
            orderData[deptIdx].members.push({name: newName.trim(), item:"", sugar:"", ice:"", note:"", locked:false});
            renderTable();
            saveCloudData();
        }
    }

    // 刪除人員
    function deleteMember(deptIdx) {
        const dept = orderData[deptIdx];
        if (dept.members.length === 0) return alert("已無人員可刪除。");

        let menuString = `請輸入欲刪除的人員編號 (1 ~ ${dept.members.length})：\n`;
        dept.members.forEach((m, i) => menuString += `${i + 1}. ${m.name}\n`);

        const choice = prompt(menuString);
        if (choice) {
            const index = parseInt(choice, 10) - 1;
            if (index >= 0 && index < dept.members.length) {
                if (confirm(`確定要刪除人員【${dept.members[index].name}】嗎？`)) {
                    dept.members.splice(index, 1);
                    renderTable();
                    saveCloudData();
                }
            } else { alert("編號錯誤。"); }
        }
    }

    // 全部清除功能
    function confirmClearAll() {
        if (confirm("確定要全部清除嗎？\n這將會清空目前畫面上所有【未鎖定】同仁的填寫欄位。")) {
            orderData.forEach(dept => {
                dept.members.forEach(m => {
                    if(!m.locked) {
                        m.item = ""; m.sugar = ""; m.ice = ""; m.note = "";
                    }
                });
            });
            renderTable();
            saveCloudData();
        }
    }

    function showStatus(msg) {
        document.getElementById("loadingStatus").innerText = msg;
    }

    // 網頁載入時啟動
    window.onload = initAndLoad;
</script>

</body>
</html>
